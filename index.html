<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Resume Studio v2.5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; overflow:hidden; }
    .tool-panel { width: 320px; height:100vh; overflow:auto; background:#020617; color:#e5e7eb; padding:16px; border-color:#1e293b; }
    .resume-page { width: 8.5in; min-height: 11in; background:white; color:#111827; padding:34px; box-shadow:0 20px 55px rgba(0,0,0,.45); }
    .resume-grid { display:grid; grid-template-columns: 1fr 2fr; gap:24px; align-items:start; }
    .column { min-height: 250px; border:1px dashed transparent; padding:8px; display:flex; flex-direction:column; gap:14px; }
    .block { position:relative; border:2px solid transparent; border-radius:10px; padding:10px; overflow:visible; }
    .block:hover, .block.active { border-color:#a855f7; }
    .block-tools { display:none; position:absolute; top:-24px; right:6px; background:#7c3aed; color:white; border-radius:6px 6px 0 0; font-size:10px; padding:3px 7px; gap:6px; z-index:5; }
    .block:hover .block-tools, .block.active .block-tools { display:flex; }
    .drag-handle { cursor:move; }
    [contenteditable="true"] { outline:none; }
    .profile-frame { width:142px; height:142px; border-radius:999px; border:5px solid #38bdf8; background:#e2e8f0 center/cover no-repeat; margin:0 auto; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .profile-frame img { width:100%; height:100%; object-fit:cover; display:block; }
    .placeholder-icon { color:#64748b; font-size:46px; }
    .status { min-height:42px; white-space:pre-wrap; }
    .pill { display:inline-block; border:1px solid #334155; color:#cbd5e1; background:#0f172a; border-radius:999px; padding:4px 8px; font-size:11px; margin:3px; cursor:pointer; }
    .pill.selected { background:#0369a1; color:white; border-color:#38bdf8; }
    .page-break { page-break-before:always; break-before:page; height:0; margin:0; padding:0; }
    @media print {
      @page { size: A4; margin: 12mm; }
      body { overflow:visible !important; background:white !important; }
      .no-print { display:none !important; }
      main { display:block !important; padding:0 !important; overflow:visible !important; background:white !important; }
      .resume-page { width:100% !important; min-height:auto !important; padding:0 !important; box-shadow:none !important; }
      .resume-grid { display:grid !important; grid-template-columns: 1fr 2fr !important; gap:18px !important; }
      .column { border:none !important; padding:0 !important; min-height:0 !important; }
      .block { border:none !important; break-inside:avoid; page-break-inside:avoid; }
      .block-tools { display:none !important; }
    }
  </style>
</head>
<body class="bg-slate-900 flex">
  <aside class="tool-panel no-print border-r">
    <h1 class="text-lg font-black">Resume Studio <span class="text-xs bg-purple-900 text-purple-200 rounded px-2 py-0.5">v2.5</span></h1>
    <p class="text-xs text-slate-400 mt-1">Stable photo upload build. Photos show with object URLs first, then embed for saving.</p>

    <div class="mt-4 space-y-2 bg-slate-900 border border-slate-800 rounded-xl p-3">
      <h2 class="text-xs font-bold text-pink-300 uppercase tracking-wide">Photo</h2>
      <input id="photoInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif,image/*" class="w-full text-xs text-slate-300 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-pink-600 file:text-white" onchange="handlePhotoInput(this)">
      <button class="w-full bg-pink-700 hover:bg-pink-800 text-white rounded py-2 text-xs font-bold" onclick="document.getElementById('photoInput').click()">Upload Photo</button>
      <div class="grid grid-cols-2 gap-2 text-xs">
        <label>Shadow blur <input id="shadowBlur" type="range" min="0" max="35" value="14" class="w-full" oninput="applyPhotoShadow()"></label>
        <label>Opacity <input id="shadowOpacity" type="range" min="0" max="80" value="38" class="w-full" oninput="applyPhotoShadow()"></label>
      </div>
      <button class="w-full bg-cyan-800 hover:bg-cyan-900 text-white rounded py-1.5 text-xs font-bold" onclick="ensurePhotoBlock(); applyPhotoShadow();">Apply circle shadow</button>
    </div>

    <div class="mt-4 space-y-2 bg-slate-900 border border-slate-800 rounded-xl p-3">
      <h2 class="text-xs font-bold text-slate-300 uppercase tracking-wide">Workspace</h2>
      <div class="grid grid-cols-2 gap-2">
        <button class="bg-teal-700 hover:bg-teal-800 text-white rounded py-1.5 text-xs font-bold" onclick="downloadWorkspace()">Download JSON</button>
        <label class="bg-slate-700 hover:bg-slate-600 text-white rounded py-1.5 text-xs font-bold text-center cursor-pointer">Load JSON<input type="file" accept=".json" class="hidden" onchange="loadWorkspaceInput(this)"></label>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <button class="bg-indigo-700 hover:bg-indigo-800 text-white rounded py-1.5 text-xs font-bold" onclick="openDiskWorkspace()">Open Disk</button>
        <button class="bg-indigo-600 hover:bg-indigo-700 text-white rounded py-1.5 text-xs font-bold" onclick="saveOverDiskWorkspace()">Save Over</button>
      </div>
      <button class="w-full bg-indigo-950 border border-indigo-800 hover:bg-indigo-900 text-indigo-200 rounded py-1.5 text-xs font-bold" onclick="saveAsDiskWorkspace()">Save As Disk File</button>
      <button class="w-full bg-blue-700 hover:bg-blue-800 text-white rounded py-2 text-xs font-bold" onclick="window.print()">Export Designed PDF</button>
    </div>

    <div class="mt-4 space-y-2 bg-slate-900 border border-slate-800 rounded-xl p-3">
      <h2 class="text-xs font-bold text-amber-300 uppercase tracking-wide">Add blocks</h2>
      <div class="grid grid-cols-2 gap-2">
        <button class="bg-slate-800 hover:bg-slate-700 rounded py-1.5 text-xs" onclick="addBlock('photo','sidebar')">Photo</button>
        <button class="bg-slate-800 hover:bg-slate-700 rounded py-1.5 text-xs" onclick="addBlock('name','main')">Name</button>
        <button class="bg-slate-800 hover:bg-slate-700 rounded py-1.5 text-xs" onclick="addBlock('contact','sidebar')">Contact</button>
        <button class="bg-slate-800 hover:bg-slate-700 rounded py-1.5 text-xs" onclick="addBlock('skills','sidebar')">Skills</button>
        <button class="bg-slate-800 hover:bg-slate-700 rounded py-1.5 text-xs" onclick="addBlock('text','main')">Text</button>
        <button class="bg-slate-800 hover:bg-slate-700 rounded py-1.5 text-xs" onclick="addBlock('divider','main')">Divider</button>
      </div>
    </div>

    <div class="mt-4 space-y-2 bg-slate-900 border border-slate-800 rounded-xl p-3">
      <h2 class="text-xs font-bold text-sky-300 uppercase tracking-wide">Visible keyword helper</h2>
      <textarea id="jobAd" rows="5" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-xs" placeholder="Paste job ad..."></textarea>
      <button class="w-full bg-sky-700 hover:bg-sky-800 text-white rounded py-1.5 text-xs font-bold" onclick="suggestKeywords()">Suggest missing terms</button>
      <div id="keywordBox" class="max-h-36 overflow-auto"></div>
      <button class="w-full bg-emerald-700 hover:bg-emerald-800 text-white rounded py-1.5 text-xs font-bold" onclick="insertSelectedKeywords()">Insert selected visible keywords</button>
    </div>

    <div id="status" class="status mt-4 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-amber-300">v2.5 loaded.</div>
  </aside>

  <main class="flex-1 h-screen overflow-auto p-8 flex justify-center items-start bg-slate-900">
    <div id="resumePage" class="resume-page">
      <div class="resume-grid">
        <div id="sidebar" class="column"></div>
        <div id="main" class="column"></div>
      </div>
    </div>
  </main>

  <template id="tpl-photo">
    <section class="block photo-block" data-type="photo">
      <div class="block-tools no-print"><span class="drag-handle">move</span><button onclick="duplicateBlock(this)">copy</button><button onclick="deleteBlock(this)">del</button></div>
      <div class="profile-frame"><span class="placeholder-icon">👤</span><img class="profile-img" alt="Profile photo" hidden></div>
    </section>
  </template>
  <template id="tpl-name">
    <section class="block" data-type="name">
      <div class="block-tools no-print"><span class="drag-handle">move</span><button onclick="duplicateBlock(this)">copy</button><button onclick="deleteBlock(this)">del</button></div>
      <h1 contenteditable="true" class="text-3xl font-black tracking-tight">CHRISTOPHER TYLER</h1>
      <p contenteditable="true" class="text-sm font-bold text-sky-600 uppercase tracking-wide mt-1">Operations Specialist · Category Operations</p>
    </section>
  </template>
  <template id="tpl-contact">
    <section class="block" data-type="contact">
      <div class="block-tools no-print"><span class="drag-handle">move</span><button onclick="duplicateBlock(this)">copy</button><button onclick="deleteBlock(this)">del</button></div>
      <h2 contenteditable="true" class="font-bold uppercase text-xs border-b pb-1 mb-2">Contact Details</h2>
      <p contenteditable="true" class="text-xs leading-relaxed">Email: email@example.com<br>Phone: +49 ...<br>Location: Berlin, Germany</p>
    </section>
  </template>
  <template id="tpl-skills">
    <section class="block" data-type="skills">
      <div class="block-tools no-print"><span class="drag-handle">move</span><button onclick="duplicateBlock(this)">copy</button><button onclick="deleteBlock(this)">del</button></div>
      <h2 contenteditable="true" class="font-bold uppercase text-xs border-b pb-1 mb-2">Core Skills</h2>
      <p contenteditable="true" class="text-xs leading-relaxed">Category Operations · Order Management · Supplier Communication · PO Confirmation · Delivery Tracking · Article Data · EAN / GTIN Checks · Jira · Confluence · Looker · Process Improvement · Automation</p>
    </section>
  </template>
  <template id="tpl-text">
    <section class="block" data-type="text">
      <div class="block-tools no-print"><span class="drag-handle">move</span><button onclick="duplicateBlock(this)">copy</button><button onclick="deleteBlock(this)">del</button></div>
      <h2 contenteditable="true" class="font-bold uppercase text-sm border-b pb-1 mb-2">Professional Experience</h2>
      <p contenteditable="true" class="text-xs leading-relaxed whitespace-pre-line">Describe impact, scope, tools, stakeholders, and measurable outcomes here.</p>
    </section>
  </template>
  <template id="tpl-divider">
    <section class="block" data-type="divider">
      <div class="block-tools no-print"><span class="drag-handle">move</span><button onclick="duplicateBlock(this)">copy</button><button onclick="deleteBlock(this)">del</button></div>
      <hr class="border-t-2 border-sky-400">
    </section>
  </template>

  <script>
    var activeBlock = null;
    var workspaceFileHandle = null;

    window.addEventListener('DOMContentLoaded', function () {
      addBlock('photo', 'sidebar');
      addBlock('contact', 'sidebar');
      addBlock('skills', 'sidebar');
      addBlock('name', 'main');
      addBlock('text', 'main');
      initSortables();
      document.getElementById('resumePage').addEventListener('click', function (event) {
        var block = event.target.closest('.block');
        if (block) selectBlock(block);
      });
      status('v2.5 loaded. Try the photo upload now.');
    });

    function status(message) {
      document.getElementById('status').textContent = message;
      console.log('[Resume Studio]', message);
    }

    function initSortables() {
      if (!window.Sortable) { status('Sortable did not load; dragging disabled, app still works.'); return; }
      ['sidebar', 'main'].forEach(function (id) {
        new Sortable(document.getElementById(id), { group: 'resume', animation: 150, handle: '.drag-handle' });
      });
    }

    function selectBlock(block) {
      document.querySelectorAll('.block').forEach(function (b) { b.classList.remove('active'); });
      block.classList.add('active');
      activeBlock = block;
    }

    function addBlock(type, columnId) {
      var tpl = document.getElementById('tpl-' + type);
      if (!tpl) { status('Missing template: ' + type); return null; }
      var node = tpl.content.firstElementChild.cloneNode(true);
      document.getElementById(columnId || 'main').appendChild(node);
      selectBlock(node);
      return node;
    }

    function duplicateBlock(button) {
      var block = button.closest('.block');
      var clone = block.cloneNode(true);
      block.parentNode.insertBefore(clone, block.nextSibling);
      selectBlock(clone);
    }

    function deleteBlock(button) {
      var block = button.closest('.block');
      block.remove();
      activeBlock = null;
    }

    function ensurePhotoBlock() {
      var block = activeBlock && activeBlock.dataset.type === 'photo' ? activeBlock : document.querySelector('.photo-block');
      if (!block) block = addBlock('photo', 'sidebar');
      selectBlock(block);
      return block;
    }

    function handlePhotoInput(input) {
      var file = input.files && input.files[0];
      if (!file) return;
      status('Photo selected: ' + file.name + ' (' + Math.round(file.size / 1024) + ' KB). Showing preview...');
      var block = ensurePhotoBlock();
      var frame = block.querySelector('.profile-frame');
      var img = block.querySelector('.profile-img');
      var placeholder = block.querySelector('.placeholder-icon');
      var objectUrl = URL.createObjectURL(file);

      img.onload = function () {
        if (placeholder) placeholder.hidden = true;
        img.hidden = false;
        frame.style.backgroundImage = 'url("' + objectUrl + '")';
        applyPhotoShadow();
        status('Photo is visible using object URL. Embedding copy for JSON save...');
        embedPhotoForSaving(file, img, frame);
      };

      img.onerror = function () {
        frame.style.backgroundImage = 'url("' + objectUrl + '")';
        img.hidden = true;
        if (placeholder) placeholder.hidden = true;
        applyPhotoShadow();
        status('Image tag failed, but background preview was applied. This can happen with unusual JPEG encoding.');
      };

      img.src = objectUrl;
      input.value = '';
    }

    function embedPhotoForSaving(file, img, frame) {
      var reader = new FileReader();
      reader.onload = function (event) {
        var dataUrl = event.target.result;
        img.dataset.embeddedSrc = dataUrl;
        frame.dataset.embeddedBg = dataUrl;
        status('Photo preview works and embedded copy is stored for workspace save.');
      };
      reader.onerror = function () {
        status('Photo preview works, but embedding failed. The image may not persist in saved JSON.');
      };
      reader.readAsDataURL(file);
    }

    function applyPhotoShadow() {
      var block = ensurePhotoBlock();
      var frame = block.querySelector('.profile-frame');
      var blur = Number(document.getElementById('shadowBlur').value || 0);
      var opacity = Number(document.getElementById('shadowOpacity').value || 0) / 100;
      var y = Math.max(2, Math.round(blur / 3));
      var shadow = '0 ' + y + 'px ' + blur + 'px rgba(0,0,0,' + opacity + ')';
      frame.style.boxShadow = opacity === 0 || blur === 0 ? 'none' : shadow;
      frame.style.filter = opacity === 0 || blur === 0 ? 'none' : 'drop-shadow(' + shadow + ')';
      status('Photo shadow applied.');
    }

    function getWorkspaceData() {
      document.querySelectorAll('.profile-img').forEach(function (img) {
        if (img.dataset.embeddedSrc) img.setAttribute('src', img.dataset.embeddedSrc);
      });
      document.querySelectorAll('.profile-frame').forEach(function (frame) {
        if (frame.dataset.embeddedBg) frame.style.backgroundImage = 'url("' + frame.dataset.embeddedBg + '")';
      });
      return {
        version: '2.5',
        sidebarHTML: document.getElementById('sidebar').innerHTML,
        mainHTML: document.getElementById('main').innerHTML
      };
    }

    function applyWorkspaceData(data) {
      document.getElementById('sidebar').innerHTML = data.sidebarHTML || '';
      document.getElementById('main').innerHTML = data.mainHTML || '';
      activeBlock = null;
      status('Workspace loaded.');
    }

    function downloadWorkspace() {
      var blob = new Blob([JSON.stringify(getWorkspaceData(), null, 2)], { type: 'application/json' });
      var link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'resume_studio_workspace_v2_5.json';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
      status('Workspace JSON downloaded.');
    }

    function loadWorkspaceInput(input) {
      var file = input.files && input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (event) {
        try { applyWorkspaceData(JSON.parse(event.target.result)); workspaceFileHandle = null; }
        catch (error) { status('Could not load JSON: ' + error.message); }
      };
      reader.readAsText(file);
      input.value = '';
    }

    function supportsDiskAPI() { return !!(window.showOpenFilePicker && window.showSaveFilePicker); }

    async function openDiskWorkspace() {
      try {
        if (!supportsDiskAPI()) { status('Disk API unavailable in this browser. Use Chrome/Edge or normal JSON load.'); return; }
        var handles = await window.showOpenFilePicker({ types: [{ description: 'Resume Studio JSON', accept: { 'application/json': ['.json'] } }], multiple: false });
        workspaceFileHandle = handles[0];
        var file = await workspaceFileHandle.getFile();
        applyWorkspaceData(JSON.parse(await file.text()));
        status('Opened disk file: ' + file.name + '. Save Over is now active.');
      } catch (error) { if (error.name !== 'AbortError') status('Open disk failed: ' + error.message); }
    }

    async function saveOverDiskWorkspace() {
      try {
        if (!supportsDiskAPI()) { downloadWorkspace(); status('Disk API unavailable, downloaded instead.'); return; }
        if (!workspaceFileHandle) { await saveAsDiskWorkspace(); return; }
        var writable = await workspaceFileHandle.createWritable();
        await writable.write(JSON.stringify(getWorkspaceData(), null, 2));
        await writable.close();
        status('Saved over opened disk file.');
      } catch (error) { if (error.name !== 'AbortError') status('Save over failed: ' + error.message); }
    }

    async function saveAsDiskWorkspace() {
      try {
        if (!supportsDiskAPI()) { downloadWorkspace(); status('Disk API unavailable, downloaded instead.'); return; }
        workspaceFileHandle = await window.showSaveFilePicker({ suggestedName: 'resume_studio_workspace_v2_5.json', types: [{ description: 'Resume Studio JSON', accept: { 'application/json': ['.json'] } }] });
        var writable = await workspaceFileHandle.createWritable();
        await writable.write(JSON.stringify(getWorkspaceData(), null, 2));
        await writable.close();
        status('Saved as disk file. Future Save Over will overwrite that chosen file.');
      } catch (error) { if (error.name !== 'AbortError') status('Save as failed: ' + error.message); }
    }

    function suggestKeywords() {
      var job = document.getElementById('jobAd').value.toLowerCase();
      var resume = document.getElementById('resumePage').innerText.toLowerCase();
      var priority = ['category operations','order management','supplier communication','stakeholder management','process improvement','automation','delivery tracking','po confirmation','article data','ean','gtin','jira','confluence','looker','retail operations'];
      var box = document.getElementById('keywordBox');
      box.innerHTML = '';
      priority.filter(function (term) { return job.indexOf(term) >= 0 && resume.indexOf(term) < 0; }).forEach(function (term) {
        var pill = document.createElement('span');
        pill.className = 'pill';
        pill.textContent = term;
        pill.onclick = function () { pill.classList.toggle('selected'); };
        box.appendChild(pill);
      });
      if (!box.innerHTML) box.textContent = 'No priority missing terms found.';
    }

    function insertSelectedKeywords() {
      var terms = Array.from(document.querySelectorAll('#keywordBox .pill.selected')).map(function (p) { return p.textContent; });
      if (!terms.length) { status('Select some keyword pills first.'); return; }
      var block = addBlock('skills', 'sidebar');
      block.querySelector('h2').textContent = 'Relevant Skills & Keywords';
      block.querySelector('p').textContent = terms.join(' · ');
      status('Inserted visible keyword block.');
    }

    window.onerror = function (message, source, lineno, colno) {
      status('JavaScript error: ' + message + ' at line ' + lineno + ':' + colno);
    };
  </script>
</body>
</html>
