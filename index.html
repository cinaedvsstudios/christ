<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Resume Studio v2.6</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;overflow:hidden}.panel{width:335px;height:100vh;overflow:auto;background:#020617;color:#e5e7eb;padding:16px}.card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:12px;margin-top:14px}.title{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:#cbd5e1;margin-bottom:8px}.btn{border-radius:7px;padding:7px 8px;font-size:12px;font-weight:800;text-align:center}.field{width:100%;background:#020617;color:#e5e7eb;border:1px solid #334155;border-radius:7px;padding:6px;font-size:12px}.page{width:8.5in;min-height:11in;background:white;color:#111827;padding:34px;box-shadow:0 20px 55px rgba(0,0,0,.45)}.gridcv{display:grid;grid-template-columns:1fr 2fr;gap:24px}.col{min-height:260px;padding:8px;display:flex;flex-direction:column;gap:14px}.block{position:relative;border:2px solid transparent;border-radius:10px;padding:10px;overflow:visible}.block:hover,.block.active{border-color:#a855f7}.tools{display:none;position:absolute;top:-24px;right:6px;background:#7c3aed;color:white;border-radius:6px 6px 0 0;font-size:10px;padding:3px 7px;gap:6px;z-index:5}.block:hover .tools,.block.active .tools{display:flex}.drag{cursor:move}[contenteditable=true]{outline:none}[contenteditable=true]:focus{background:rgba(56,189,248,.08)}.photoFrame{width:142px;height:142px;border-radius:999px;border:5px solid #38bdf8;background:#e2e8f0 center/cover no-repeat;margin:0 auto;overflow:hidden;display:flex;align-items:center;justify-content:center}.photoFrame img{width:100%;height:100%;object-fit:cover;display:block}.ph{font-size:46px;color:#64748b}.pill{display:inline-block;border:1px solid #334155;color:#cbd5e1;background:#0f172a;border-radius:999px;padding:4px 8px;font-size:11px;margin:3px;cursor:pointer}.pill.sel{background:#0369a1;color:white;border-color:#38bdf8}.status{min-height:42px;white-space:pre-wrap}@media print{@page{size:A4;margin:12mm}body{overflow:visible!important;background:white!important}.noPrint{display:none!important}main{display:block!important;padding:0!important;overflow:visible!important;background:white!important}.page,.ats{width:100%!important;min-height:auto!important;padding:0!important;box-shadow:none!important}.gridcv{display:grid!important;grid-template-columns:1fr 2fr!important;gap:18px!important}.col{padding:0!important;min-height:0!important}.block{border:none!important;break-inside:avoid;page-break-inside:avoid}.tools{display:none!important}body.printAts #resume{display:none!important}body.printAts #ats{display:block!important}body.printVisual #ats{display:none!important}}
</style>
</head>
<body class="bg-slate-900 flex">
<aside class="panel noPrint">
<h1 class="text-lg font-black">Resume Studio <span class="text-xs bg-purple-900 text-purple-200 rounded px-2 py-0.5">v2.6</span></h1>
<p class="text-xs text-slate-400 mt-1">Photo fix kept. Controls restored. Blank placeholders by default.</p>
<div class="card"><div class="title text-pink-300">Photo</div><input id="photoInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif,image/*" class="w-full text-xs text-slate-300 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-bold file:bg-pink-600 file:text-white" onchange="photoLoad(this)"><button class="btn w-full bg-pink-700 hover:bg-pink-800 text-white mt-2" onclick="photoInput.click()">Upload Photo</button><div class="grid grid-cols-2 gap-2 text-xs mt-2"><label>Shadow blur<input id="shadowBlur" type="range" min="0" max="35" value="14" class="w-full" oninput="photoShadow()"></label><label>Opacity<input id="shadowOpacity" type="range" min="0" max="80" value="38" class="w-full" oninput="photoShadow()"></label></div><button class="btn w-full bg-cyan-800 hover:bg-cyan-900 text-white mt-2" onclick="ensurePhoto();photoShadow()">Apply circle shadow</button></div>
<div class="card"><div class="title text-purple-300">Inspector</div><p id="selectedInfo" class="text-xs text-slate-400 mb-2">No block selected.</p><div class="grid grid-cols-3 gap-2"><button class="btn bg-slate-800" onclick="fmt('bold')">Bold</button><button class="btn bg-slate-800 italic" onclick="fmt('italic')">Italic</button><button class="btn bg-slate-800 underline" onclick="fmt('underline')">Under</button></div><div class="grid grid-cols-3 gap-2 mt-2"><button class="btn bg-slate-800" onclick="fmt('justifyLeft')">Left</button><button class="btn bg-slate-800" onclick="fmt('justifyCenter')">Centre</button><button class="btn bg-slate-800" onclick="fmt('justifyRight')">Right</button></div><div class="grid grid-cols-2 gap-2 mt-2"><button class="btn bg-slate-800" onclick="fmt('insertUnorderedList')">Bullets</button><select class="field" onchange="fmt('fontSize',this.value)"><option value="2">Small</option><option value="3" selected>Normal</option><option value="4">Medium</option><option value="5">Large</option><option value="6">XL</option></select></div><div class="grid grid-cols-2 gap-2 mt-2 text-xs"><label>Text color<input type="color" class="w-full h-8" value="#111827" onchange="fmt('foreColor',this.value)"></label><label>Block bg<input id="bgPick" type="color" class="w-full h-8" value="#ffffff" onchange="styleBlock('backgroundColor',this.value)"></label></div><div class="grid grid-cols-2 gap-2 mt-2 text-xs"><label>Border<input id="borderPick" type="color" class="w-full h-8" value="#a855f7" onchange="borderBlock(this.value)"></label><label>Radius<input id="radiusPick" type="number" class="field" value="10" onchange="styleBlock('borderRadius',this.value+'px')"></label></div><div class="grid grid-cols-2 gap-2 mt-2"><button class="btn bg-blue-800" onclick="copyActive()">Duplicate</button><button class="btn bg-red-800" onclick="delActive()">Delete</button></div></div>
<div class="card"><div class="title">Workspace</div><div class="grid grid-cols-2 gap-2"><button class="btn bg-teal-700 text-white" onclick="downloadJSON()">Download JSON</button><label class="btn bg-slate-700 text-white cursor-pointer">Load JSON<input type="file" accept=".json" class="hidden" onchange="loadJSON(this)"></label></div><div class="grid grid-cols-2 gap-2 mt-2"><button class="btn bg-indigo-700 text-white" onclick="openDisk()">Open Disk</button><button class="btn bg-indigo-600 text-white" onclick="saveOver()">Save Over</button></div><button class="btn w-full bg-indigo-950 border border-indigo-800 text-indigo-200 mt-2" onclick="saveAs()">Save As Disk File</button><div class="grid grid-cols-2 gap-2 mt-2"><button class="btn bg-blue-700 text-white" onclick="printVisual()">Designed PDF</button><button class="btn bg-amber-600 text-slate-950" onclick="printAts()">ATS PDF</button></div></div>
<div class="card"><div class="title text-amber-300">Add blocks</div><div class="grid grid-cols-2 gap-2"><button class="btn bg-slate-800" onclick="add('photo','side')">Photo</button><button class="btn bg-slate-800" onclick="add('name','main')">Name</button><button class="btn bg-slate-800" onclick="add('contact','side')">Contact</button><button class="btn bg-slate-800" onclick="add('skills','side')">Skills</button><button class="btn bg-slate-800" onclick="add('text','main')">Text</button><button class="btn bg-slate-800" onclick="add('divider','main')">Divider</button></div></div>
<div class="card"><div class="title text-sky-300">Visible keyword helper</div><textarea id="jobAd" rows="5" class="field" placeholder="Paste job ad..."></textarea><button class="btn w-full bg-sky-700 text-white mt-2" onclick="keywords()">Suggest missing terms</button><div id="keywordBox" class="max-h-36 overflow-auto mt-2"></div><button class="btn w-full bg-emerald-700 text-white mt-2" onclick="insertKeywords()">Insert selected visible keywords</button></div><div id="status" class="status mt-4 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-amber-300">v2.6 loaded.</div>
</aside>
<main class="flex-1 h-screen overflow-auto p-8 flex justify-center items-start bg-slate-900"><div id="resume" class="page"><div class="gridcv"><div id="side" class="col"></div><div id="main" class="col"></div></div></div><div id="ats" class="ats hidden bg-white text-slate-900 p-12 w-[8.5in] min-h-[11in]"></div></main>
<template id="t-photo"><section class="block photoBlock" data-type="photo"><div class="tools noPrint"><span class="drag">move</span><button onclick="copyBtn(this)">copy</button><button onclick="delBtn(this)">del</button></div><div class="photoFrame"><span class="ph">👤</span><img class="photoImg" alt="Profile photo" hidden></div></section></template>
<template id="t-name"><section class="block" data-type="name"><div class="tools noPrint"><span class="drag">move</span><button onclick="copyBtn(this)">copy</button><button onclick="delBtn(this)">del</button></div><h1 contenteditable="true" class="text-3xl font-black tracking-tight">[YOUR NAME]</h1><p contenteditable="true" class="text-sm font-bold text-sky-600 uppercase tracking-wide mt-1">[PROFESSIONAL TITLE]</p></section></template>
<template id="t-contact"><section class="block" data-type="contact"><div class="tools noPrint"><span class="drag">move</span><button onclick="copyBtn(this)">copy</button><button onclick="delBtn(this)">del</button></div><h2 contenteditable="true" class="font-bold uppercase text-xs border-b pb-1 mb-2">Contact Details</h2><p contenteditable="true" class="text-xs leading-relaxed">Email: [email]<br>Phone: [phone]<br>Location: [location]</p></section></template>
<template id="t-skills"><section class="block" data-type="skills"><div class="tools noPrint"><span class="drag">move</span><button onclick="copyBtn(this)">copy</button><button onclick="delBtn(this)">del</button></div><h2 contenteditable="true" class="font-bold uppercase text-xs border-b pb-1 mb-2">Core Skills</h2><p contenteditable="true" class="text-xs leading-relaxed">[Skill] · [Skill] · [Tool] · [Process]</p></section></template>
<template id="t-text"><section class="block" data-type="text"><div class="tools noPrint"><span class="drag">move</span><button onclick="copyBtn(this)">copy</button><button onclick="delBtn(this)">del</button></div><h2 contenteditable="true" class="font-bold uppercase text-sm border-b pb-1 mb-2">Section Title</h2><p contenteditable="true" class="text-xs leading-relaxed whitespace-pre-line">Content goes here.</p></section></template>
<template id="t-divider"><section class="block" data-type="divider"><div class="tools noPrint"><span class="drag">move</span><button onclick="copyBtn(this)">copy</button><button onclick="delBtn(this)">del</button></div><hr class="border-t-2 border-sky-400"></section></template>
<script>
let active=null,fileHandle=null;window.addEventListener('DOMContentLoaded',()=>{add('photo','side');add('contact','side');add('skills','side');add('name','main');add('text','main');sorts();resume.addEventListener('click',e=>{let b=e.target.closest('.block');if(b)select(b)});status('v2.6 loaded. Blank placeholders restored; photo upload still uses object URL.')});function status(m){document.getElementById('status').textContent=m;console.log('[Resume Studio]',m)}function sorts(){if(!window.Sortable){status('Sortable did not load; dragging disabled.');return}['side','main'].forEach(id=>new Sortable(document.getElementById(id),{group:'resume',animation:150,handle:'.drag'}))}function select(b){document.querySelectorAll('.block').forEach(x=>x.classList.remove('active'));b.classList.add('active');active=b;selectedInfo.textContent='Selected: '+(b.dataset.type||'block')}function add(type,col){let t=document.getElementById('t-'+type);if(!t)return status('Missing template: '+type);let n=t.content.firstElementChild.cloneNode(true);document.getElementById(col||'main').appendChild(n);select(n);return n}function copyBtn(btn){let b=btn.closest('.block'),c=b.cloneNode(true);b.after(c);select(c)}function delBtn(btn){btn.closest('.block').remove();active=null;selectedInfo.textContent='No block selected.'}function copyActive(){if(!active)return status('Select a block first.');let c=active.cloneNode(true);active.after(c);select(c)}function delActive(){if(!active)return status('Select a block first.');active.remove();active=null;selectedInfo.textContent='No block selected.'}function fmt(c,v){document.execCommand(c,false,v||null)}function styleBlock(p,v){if(!active)return status('Select a block first.');active.style[p]=v}function borderBlock(c){if(!active)return status('Select a block first.');active.style.borderColor=c;active.style.borderWidth='2px';active.style.borderStyle='solid'}function ensurePhoto(){let b=active&&active.dataset.type==='photo'?active:document.querySelector('.photoBlock');if(!b)b=add('photo','side');select(b);return b}function photoLoad(input){let f=input.files&&input.files[0];if(!f)return;status('Photo selected: '+f.name+' ('+Math.round(f.size/1024)+' KB). Showing preview...');let b=ensurePhoto(),fr=b.querySelector('.photoFrame'),img=b.querySelector('.photoImg'),ph=b.querySelector('.ph'),url=URL.createObjectURL(f);img.onload=()=>{if(ph)ph.hidden=true;img.hidden=false;fr.style.backgroundImage='url("'+url+'")';photoShadow();status('Photo is visible. Embedding copy for JSON save...');embedPhoto(f,img,fr)};img.onerror=()=>{fr.style.backgroundImage='url("'+url+'")';img.hidden=true;if(ph)ph.hidden=true;photoShadow();status('Image tag failed, but background preview was applied.')};img.src=url;input.value=''}function embedPhoto(f,img,fr){let r=new FileReader();r.onload=e=>{img.dataset.embeddedSrc=e.target.result;fr.dataset.embeddedBg=e.target.result;status('Photo preview works and embedded copy is stored.')};r.onerror=()=>status('Photo preview works, but embedding failed.');r.readAsDataURL(f)}function photoShadow(){let b=ensurePhoto(),fr=b.querySelector('.photoFrame'),blur=+shadowBlur.value||0,op=(+shadowOpacity.value||0)/100,y=Math.max(2,Math.round(blur/3)),sh='0 '+y+'px '+blur+'px rgba(0,0,0,'+op+')';fr.style.boxShadow=op===0||blur===0?'none':sh;fr.style.filter=op===0||blur===0?'none':'drop-shadow('+sh+')'}function data(){document.querySelectorAll('.photoImg').forEach(img=>{if(img.dataset.embeddedSrc)img.src=img.dataset.embeddedSrc});document.querySelectorAll('.photoFrame').forEach(fr=>{if(fr.dataset.embeddedBg)fr.style.backgroundImage='url("'+fr.dataset.embeddedBg+'")'});return{version:'2.6',side:side.innerHTML,main:main.innerHTML}}function applyData(d){side.innerHTML=d.side||d.sidebarHTML||'';main.innerHTML=d.main||d.mainHTML||'';active=null;selectedInfo.textContent='No block selected.';status('Workspace loaded.')}function downloadJSON(){let blob=new Blob([JSON.stringify(data(),null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='resume_studio_workspace_v2_6.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);status('Workspace JSON downloaded.')}function loadJSON(i){let f=i.files&&i.files[0];if(!f)return;let r=new FileReader();r.onload=e=>{try{applyData(JSON.parse(e.target.result));fileHandle=null}catch(err){status('Could not load JSON: '+err.message)}};r.readAsText(f);i.value=''}function diskOK(){return!!(window.showOpenFilePicker&&window.showSaveFilePicker)}async function openDisk(){try{if(!diskOK())return status('Disk API unavailable in this browser. Use Chrome/Edge or JSON load.');let h=await showOpenFilePicker({types:[{description:'Resume Studio JSON',accept:{'application/json':['.json']}}],multiple:false});fileHandle=h[0];let f=await fileHandle.getFile();applyData(JSON.parse(await f.text()));status('Opened disk file: '+f.name)}catch(e){if(e.name!=='AbortError')status('Open disk failed: '+e.message)}}async function saveOver(){try{if(!diskOK()){downloadJSON();return status('Disk API unavailable, downloaded instead.')}if(!fileHandle){await saveAs();return}let w=await fileHandle.createWritable();await w.write(JSON.stringify(data(),null,2));await w.close();status('Saved over opened disk file.')}catch(e){if(e.name!=='AbortError')status('Save over failed: '+e.message)}}async function saveAs(){try{if(!diskOK()){downloadJSON();return status('Disk API unavailable, downloaded instead.')}fileHandle=await showSaveFilePicker({suggestedName:'resume_studio_workspace_v2_6.json',types:[{description:'Resume Studio JSON',accept:{'application/json':['.json']}}]});let w=await fileHandle.createWritable();await w.write(JSON.stringify(data(),null,2));await w.close();status('Saved as disk file.')}catch(e){if(e.name!=='AbortError')status('Save as failed: '+e.message)}}function clean(t){return(t||'').replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu,'').replace(/\s+/g,' ').trim()}function buildAts(){ats.innerHTML='';let nm=document.querySelector('[data-type=name] h1'),h=document.createElement('h1');h.textContent=clean(nm?nm.innerText:'');h.style.cssText='font-size:26px;font-weight:bold;margin-bottom:10px';ats.appendChild(h);document.querySelectorAll('[data-type=contact],[data-type=skills],[data-type=text]').forEach(b=>{let s=document.createElement('section'),hd=b.querySelector('h2'),p=document.createElement('p');s.style.cssText='margin-bottom:18px;break-inside:avoid';if(hd){let x=document.createElement('h2');x.textContent=clean(hd.innerText);x.style.cssText='font-size:13px;font-weight:bold;text-transform:uppercase;border-bottom:1px solid #111827;margin-bottom:6px';s.appendChild(x)}p.textContent=clean(b.innerText.replace(hd?hd.innerText:'' ,''));p.style.cssText='font-size:11px;line-height:1.5';s.appendChild(p);ats.appendChild(s)})}function printVisual(){document.body.classList.remove('printAts');document.body.classList.add('printVisual');setTimeout(()=>print(),50)}function printAts(){buildAts();document.body.classList.remove('printVisual');document.body.classList.add('printAts');setTimeout(()=>print(),50)}function keywords(){let job=jobAd.value.toLowerCase(),cv=resume.innerText.toLowerCase(),terms=['category operations','order management','supplier communication','stakeholder management','process improvement','automation','delivery tracking','po confirmation','article data','ean','gtin','jira','confluence','looker','retail operations'];keywordBox.innerHTML='';terms.filter(t=>job.includes(t)&&!cv.includes(t)).forEach(t=>{let p=document.createElement('span');p.className='pill';p.textContent=t;p.onclick=()=>p.classList.toggle('sel');keywordBox.appendChild(p)});if(!keywordBox.innerHTML)keywordBox.textContent='No priority missing terms found.'}function insertKeywords(){let terms=[...document.querySelectorAll('#keywordBox .pill.sel')].map(p=>p.textContent);if(!terms.length)return status('Select some keyword pills first.');let b=add('skills','side');b.querySelector('h2').textContent='Relevant Skills & Keywords';b.querySelector('p').textContent=terms.join(' · ')}window.onerror=(m,s,l,c)=>status('JavaScript error: '+m+' at line '+l+':'+c);
</script>
</body>
</html>
